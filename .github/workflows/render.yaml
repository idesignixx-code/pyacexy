services:
  - type: worker
    name: pyacexy-proxy
    runtime: python
    repo: https://github.com/idesignixx-code/pyacexy
    plan: free  # Use 'free' for testing, 'starter' for $7/month production
    region: frankfurt  # Options: frankfurt, ohio, singapore, oregon, virginia
    
    buildCommand: pip install -r requirements.txt
    startCommand: python pyacexy/pyacexy.py --host 0.0.0.0 --port 8000
    
    envVars:
      - key: ALLOW_REMOTE_ACCESS
        value: "yes"
      - key: PYTHON_VERSION
        value: "3.9"
    
    # Health check endpoint (customize if pyacexy has a status endpoint)
    healthCheckPath: /ace/getstream?id=test
    
    # Free tier limits: spins down after 15 minutes of inactivity
    # For production, upgrade to 'starter' ($7/month) for always-on
